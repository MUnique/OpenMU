name: Build and publish OpenMU image (Docker Hub)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to publish (example: bugfix-remove-jewels-gap)"
        required: true
        type: string

jobs:
  dockerhub-openmu:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push all-in-one image
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Startup/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/openmu:${{ inputs.image_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/openmu:latest
